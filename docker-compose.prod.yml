services:
  cursor2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor2api:latest
    container_name: cursor2api
    restart: unless-stopped
    ports:
      # ✅ 修改：对外端口 9020，容器内部端口 3010
      - "9020:3010"
    volumes:
      # 挂载外部配置文件（推荐）——修改后只需 docker compose restart 即可生效
      - ./config.yaml:/app/config.yaml:ro
      # 日志持久化（新增）
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3010
      - TIMEOUT=120
      # API Key 验证（通过环境变量配置，不要硬编码在此文件中）
      # - API_KEYS=your-secret-key-here
      # ⚠️ 阿里云服务器在国内，如需访问 Cursor API 可能需要代理
      # 如果宿主机有代理服务运行在 7890 端口，取消下面注释
      # - PROXY=http://172.17.0.1:7890

      # [可选环境变量] 以下变量如果声明，将会覆盖 config.yaml 中对应的配置：
      # - CURSOR_MODEL=anthropic/claude-sonnet-4.6

      # ── Vision 图片处理（v2.3.0 新增） ──
      # 默认使用本地 OCR（零配置），如需外部 Vision API 请在 config.yaml 中修改 vision.mode 为 'api'
      # 并配置 vision.base_url / vision.api_key / vision.model

    # 健康检查（新增）
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # 资源限制（可选，防止占用过多资源）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
